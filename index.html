<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <form>
      <h3 style="color:brown;"><u>student registration form</u></h3>
      <label for="first name">First Name:</label>
      <input type="text" id="first name" placeholder="enter the name" autofocus/><br>
      <label for="last name">last name:</label>
      <input type="text" id="last name" placeholder="enter the name" autofocus/><br>
      <label for="email">email:</label>
      <input type="text" id="email" placeholder="enter the email" autofocus/><br>
      <label for="contact">Contact:</label>
      <input type="text" id="contact" placeholder="enter the contact" autofocus/><br>
      <label for="gender">gender:</label> 
      <input type="radio">male
      <input type="radio">female<br>
      <label for="date of birth">date of birth;</label>
      <input type="date" id="date of birth"  autofocus/><br>
      <label for="city">city</label>
      <input type="text" id="city" placeholder="enter the city" autofocus/><br>
      <label for="area pin">Area pin</label>
      <input type="text" id="Area pin" placeholder="enter the area pin" autofocus/><br>
      <label for="state" id="state">state</label>
      <input type="text" id="state" placeholder="enter the state" autofocus/><br>
       <label for="qualification">Qualification:</label>
     <select>
        <option>select qualification</option>
        <option>ECE</option><br>
        <option>EEE</option><br>
      </select>
      <table>
        <tr>
          <td><label for="address">Address:</label></td>
          <td><textarea></textarea></td>
        </tr>
      </table>
      <label for="specialization">specialization:</label>
      <input type="radio">computer science
      <input type="radio">information technology<br>
      <table>
        <tr>
           <td><label for="password">password:</label></td>
           <td><textarea></textarea></td> 
        </tr>
      </table>
    </form>
</body>
</html>
